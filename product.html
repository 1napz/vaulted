<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>จัดการสินค้า - Crystal Castle</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom CSS เพิ่มเติม -->
  <style>
    /* Fix accessibility: focus visible */
    :focus-visible {
      outline: 3px solid #8b5cf6;
      outline-offset: 2px;
      border-radius: 0.5rem;
    }
    [aria-invalid="true"] {
      border-color: #dc2626 !important;
      background-color: #fef2f2 !important;
    }
    .error-message {
      color: #dc2626;
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: block;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body class="bg-slate-50 p-4 pb-20">

  <main class="max-w-2xl mx-auto space-y-5">
    
    <!-- ส่วนที่ 1: รูปภาพสินค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">1</span>
        <h2 class="font-semibold text-slate-900">รูปสินค้า</h2>
      </div>
      <div id="previewGrid" class="grid grid-cols-3 gap-2">
        <div class="aspect-square rounded-xl border-2 border-dashed border-slate-200 flex flex-col items-center justify-center text-slate-400 bg-slate-50">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 16l4-4 4-4 4 4M12 12v-2M12 8v-2M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9z"/></svg>
          <span class="text-[11px] mt-1">ยังไม่มีรูป</span>
        </div>
      </div>
      <p class="text-[11px] text-slate-500 mt-2.5">รองรับ JPG, PNG (สูงสุด 10 รูป)</p>
    </section>

    <!-- ส่วนที่ 2: รายละเอียดสินค้า -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">2</span>
        <h2 class="font-semibold text-slate-900">รายละเอียดสินค้า</h2>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label for="dateInput" class="text-xs text-slate-500 mb-1 block">วันที่</label>
          <input id="dateInput" readonly class="w-full h-11 px-3 rounded-xl bg-slate-50 border border-slate-200 text-sm">
        </div>
        <div>
          <label for="categorySelect" class="text-xs text-slate-500 mb-1 block">หมวดหมู่</label>
          <select id="categorySelect" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
            <option value="Menswear">Menswear</option>
            <option value="Womenswear">Womenswear</option>
            <option value="Accessories">Accessories</option>
            <option value="Shoes">Shoes</option>
            <option value="Bags">Bags</option>
          </select>
        </div>
        <div class="col-span-2">
          <label for="brandInput" class="text-xs text-slate-500 mb-1 block">แบรนด์ / รุ่น</label>
          <input id="brandInput" placeholder="เช่น Uniqlo, Nike, Adidas" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <div class="col-span-2">
          <label for="filenameInput" class="text-xs text-slate-500 mb-1 block">ชื่อไฟล์</label>
          <input id="filenameInput" readonly class="w-full h-11 px-3 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-600 font-mono">
        </div>
      </div>
    </section>

    <!-- ส่วนที่ 3: คำสั่งวิดีโอ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">3</span>
          <h2 class="font-semibold text-slate-900">คำสั่งสร้างวิดีโอ</h2>
        </div>
        <button id="genPromptBtn" type="button" class="text-xs font-medium text-violet-600 bg-violet-50 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">
          ✨ AI ช่วยคิด
        </button>
      </div>
      <textarea id="promptInput" rows="3" placeholder="อธิบายลักษณะวิดีโอที่ต้องการ..." class="w-full p-3.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 resize-none"></textarea>
      <div id="promptStatus" class="text-xs text-slate-400 mt-1 flex justify-between items-center">
        <span></span>
        <div class="flex gap-2">
          <button id="copyPromptBtn" type="button" class="hidden text-violet-500 hover:text-violet-700">📋 คัดลอก</button>
          <button id="undoPromptBtn" type="button" class="hidden text-amber-500 hover:text-amber-700">↩️ กลับต้นฉบับ</button>
        </div>
      </div>
    </section>

    <!-- ส่วนที่ 4: แคปชั่นโพสต์ -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">4</span>
          <h2 class="font-semibold text-slate-900">แคปชั่นโพสต์</h2>
        </div>
        <button id="genPostBtn" type="button" class="text-xs font-medium text-violet-600 bg-violet-50 px-3 py-1.5 rounded-full hover:bg-violet-100 transition">
          ✍️ สร้างแคปชั่น
        </button>
      </div>
      <textarea id="postOutput" rows="3" readonly placeholder="กดปุ่มเพื่อสร้างแคปชั่นอัตโนมัติตามรายละเอียดสินค้า" class="w-full p-3.5 rounded-xl border border-slate-200 text-sm bg-slate-50 resize-none"></textarea>
      <div class="flex justify-end mt-1">
        <button id="copyPostBtn" type="button" class="hidden text-xs text-violet-500 hover:text-violet-700">📋 คัดลอกแคปชั่น</button>
      </div>
    </section>

    <!-- ส่วนที่ 5: เลือกเครื่องมือ (แก้ไข dropdown handler) -->
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full bg-violet-100 text-violet-700 flex items-center justify-center text-sm font-semibold">5</span>
        <h2 class="font-semibold text-slate-900">เลือกเครื่องมือสร้างวิดีโอ</h2>
      </div>
      <div class="space-y-3">
        <label for="videoEngineSelect" class="text-xs text-slate-500 block">Video Engine</label>
        <select id="videoEngineSelect" class="w-full h-11 px-3 rounded-xl border border-slate-200 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-violet-500">
          <option value="openai">OpenAI Sora</option>
          <option value="runway">Runway Gen-2</option>
          <option value="pika">Pika Labs</option>
        </select>
        <div id="engineInfo" class="text-xs text-slate-500 mt-1 italic"></div>
      </div>
    </section>

    <!-- ปุ่มหลักด้านล่าง -->
    <div class="sticky bottom-4 flex gap-3 bg-white/90 backdrop-blur-sm p-4 rounded-2xl shadow-lg border border-slate-200">
      <button id="submitBtn" type="button" class="flex-1 bg-violet-600 text-white font-medium py-3 rounded-xl hover:bg-violet-700 transition">💾 บันทึกสินค้า</button>
      <button id="logoutBtn" type="button" class="px-5 py-3 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition">🚪 ออกจากระบบ</button>
    </div>

  </main>

  <script>
    (function() {
      // แก้ไข dropdown handler ตาม CodeRabbit (ไม่ใช้ arrow function, ใช้ event.target)
      const engineSelect = document.getElementById('videoEngineSelect');
      const engineInfo = document.getElementById('engineInfo');
      const descriptions = {
        'openai': '✨ OpenAI Sora: สร้างวิดีโอความยาวสูงสุด 60 วินาที ภาพสมจริง',
        'runway': '🎬 Runway Gen-2: ควบคุมการเคลื่อนไหวได้ละเอียด เหมาะกับสินค้าแฟชั่น',
        'pika': '🎨 Pika Labs: อนิเมชันสวย เน้นอารมณ์สินค้า'
      };
      if (engineSelect && engineInfo) {
        // เปลี่ยนจาก arrow function เป็น regular function + event.target
        engineSelect.addEventListener('change', function(event) {
          const value = event.target.value;
          engineInfo.textContent = descriptions[value] || 'กรุณาเลือกเครื่องมือ';
        });
        // trigger ครั้งแรก
        engineSelect.dispatchEvent(new Event('change'));
      }

      // ส่วนอื่น ๆ ที่มีอยู่เดิม (จำลองฟังก์ชัน AI, การบันทึก ฯลฯ) 
      // ให้เพิ่ม type="button" ทุกปุ่มแล้ว

      // จัดการปุ่ม AI ช่วยคิด
      const genPromptBtn = document.getElementById('genPromptBtn');
      const promptInput = document.getElementById('promptInput');
      if (genPromptBtn && promptInput) {
        genPromptBtn.addEventListener('click', () => {
          const brand = document.getElementById('brandInput')?.value || '';
          const category = document.getElementById('categorySelect')?.value || '';
          promptInput.value = `สร้างวิดีโอแนะนำสินค้า ${brand} ${category} สไตล์โมเดิร์น สนุกสนาน ความยาว 30 วินาที`;
          document.getElementById('copyPromptBtn')?.classList.remove('hidden');
          document.getElementById('undoPromptBtn')?.classList.remove('hidden');
        });
      }

      // กลับต้นฉบับ prompt
      const undoPrompt = document.getElementById('undoPromptBtn');
      if (undoPrompt && promptInput) {
        undoPrompt.addEventListener('click', () => {
          promptInput.value = '';
          undoPrompt.classList.add('hidden');
          document.getElementById('copyPromptBtn')?.classList.add('hidden');
        });
      }

      // คัดลอก prompt
      const copyPrompt = document.getElementById('copyPromptBtn');
      if (copyPrompt && promptInput) {
        copyPrompt.addEventListener('click', () => {
          navigator.clipboard.writeText(promptInput.value);
          alert('คัดลอกคำสั่งแล้ว');
        });
      }

      // สร้างแคปชั่น (จำลอง)
      const genPostBtn = document.getElementById('genPostBtn');
      const postOutput = document.getElementById('postOutput');
      if (genPostBtn && postOutput) {
        genPostBtn.addEventListener('click', () => {
          const brand = document.getElementById('brandInput')?.value || 'สินค้า';
          const category = document.getElementById('categorySelect')?.value || '';
          postOutput.value = `✨ ${brand} สวยงาม พร้อมส่ง! #แฟชั่น #${category} สนใจทักสอบถามได้เลย 💖`;
          document.getElementById('copyPostBtn')?.classList.remove('hidden');
        });
      }

      // คัดลอกแคปชั่น
      const copyPost = document.getElementById('copyPostBtn');
      if (copyPost && postOutput) {
        copyPost.addEventListener('click', () => {
          navigator.clipboard.writeText(postOutput.value);
          alert('คัดลอกแคปชั่นแล้ว');
        });
      }

      // บันทึกสินค้า
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.addEventListener('click', () => {
          alert('บันทึกข้อมูลสินค้าเรียบร้อย (จำลอง)');
        });
      }

      // ออกจากระบบ
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          if (confirm('คุณต้องการออกจากระบบ?')) {
            window.location.href = '/logout';
          }
        });
      }

      // ตั้งค่าวันที่อัตโนมัติ
      const dateInput = document.getElementById('dateInput');
      if (dateInput) {
        const today = new Date().toLocaleDateString('th-TH');
        dateInput.value = today;
      }

      // ตั้งค่าชื่อไฟล์ (จำลอง)
      const filenameInput = document.getElementById('filenameInput');
      if (filenameInput) {
        filenameInput.value = 'product_' + Date.now() + '.json';
      }
    })();
  </script>
</body>
</html>
