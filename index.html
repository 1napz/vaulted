<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulted - AI Generation Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
        .card { background-color: #171717; border: 1px solid #262626; }
    </style>
</head>
<body class="font-sans">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-white">Vaulted</h1>
            <p class="text-gray-400">AI Generation Vault - Static Mode</p>
        </header>

        <main id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- การ์ดจะถูกใส่ด้วย JS -->
        </main>
    </div>

    <script>
        // ข้อมูล Mock ไม่ต้องต่อ Database
        const mockData = [
            {
                product_name: 'Nike Air Max Test',
                image_url: 'https://images.unsplash.com/photo-1542291026-7eec48a0a48c',
                prompt: 'photorealistic, studio lighting, 8k',
                ai_model: 'Meta AI',
                gen_time_sec: 15,
                views: 234,
                commission: 35.50
            },
            {
                product_name: 'Sony WH-1000XM5',
                image_url: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e',
                prompt: 'minimalist product shot, white background',
                ai_model: 'Gemini',
                gen_time_sec: 8,
                views: 120,
                commission: 89.00
            },
            {
                product_name: 'Apple Watch Ultra 2',
                image_url: 'https://images.unsplash.com/photo-1558126319-c4cfecad1d4e',
                prompt: 'outdoor adventure style, on a rock',
                ai_model: 'Midjourney',
                gen_time_sec: 22,
                views: 450,
                commission: 120.00
            },
            {
                product_name: 'LEGO Bonsai Tree',
                image_url: 'https://images.unsplash.com/photo-1611605698335-8b1569810432',
                prompt: 'flat lay, pastel background, cozy',
                ai_model: 'Stable Diffusion',
                gen_time_sec: 18,
                views: 89,
                commission: 15.25
            },
            {
                product_name: 'Fujifilm X100V',
                image_url: 'https://images.unsplash.com/photo-1510127034890-ba27508e9f1c',
                prompt: 'street photography style, bokeh',
                ai_model: 'Meta AI',
                gen_time_sec: 10,
                views: 300,
                commission: 210.00
            }
        ];

        const grid = document.getElementById('grid');
        
        mockData.forEach(item => {
            const card = `
                <div class="card rounded-lg overflow-hidden shadow-lg">
                    <img src="${item.image_url}" alt="${item.product_name}" class="w-full h-48 object-cover">
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-lg font-bold text-white">${item.product_name}</h2>
                            <span class="text-xs bg-blue-600 text-white px-2 py-1 rounded">${item.ai_model}</span>
                        </div>
                        <p class="text-sm text-gray-400 mb-3 h-10">${item.prompt}</p>
                        <div class="flex justify-between text-xs text-gray-500 border-t border-gray-700 pt-3">
                            <span>⏱️ ${item.gen_time_sec}s</span>
                            <span>👁️ ${item.views} views</span>
                            <span class="text-green-400 font-bold">$${item.commission}</span>
                        </div>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    </script>
</body>
</html>
