<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulted - AI Generation Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #e5e5e5; }
   .card { background-color: #171717; border: 1px solid #262626; }
   .tab-active { border-bottom: 2px solid #3b82f6; color: #fff; }
   .tab-inactive { color: #9ca3af; }
   .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="font-sans">
    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="mb-6">
            <h1 class="text-3xl font-bold text-white">Vaulted</h1>
            <p class="text-gray-400">AI Generation Vault</p>
        </header>

        <div class="flex gap-6 border-b border-gray-800 mb-6">
            <button onclick="switchTab('image')" id="tab-image" class="pb-3 tab-inactive">Image Generation</button>
            <button onclick="switchTab('video')" id="tab-video" class="pb-3 tab-active">Image to Video</button>
        </div>

        <div id="content-image" class="hidden">
            <main id="grid-image" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></main>
        </div>

        <div id="content-video" class="">
            <div class="card rounded-lg p-6 mb-6">
                <h2 class="text-xl font-bold text-white mb-4">สร้างวิดีโอจากรูปด้วย Meta AI</h2>

                <!-- ขั้นตอนที่ 1: อัปโหลด -->
                <label class="block mb-2 text-sm font-medium text-gray-300">1. อัปโหลดรูปสินค้า 1-5 รูป</label>
                <input type="file" id="imageUpload" accept="image/*" multiple class="block w-full text-sm text-gray-400 mb-2 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                <p id="fileCount" class="text-xs text-gray-500 mb-4">ยังไม่ได้เลือกรูป</p>
                <div id="preview" class="grid grid-cols-5 gap-2 mb-4"></div>

                <!-- ขั้นตอนที่ 2: ผลวิเคราะห์รูป ใหม่ -->
                <div id="analysisCard" class="hidden bg-blue-950 border border-blue-800 rounded-lg p-4 mb-4">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-sm font-bold text-blue-300">🔍 ผลวิเคราะห์จากรูปภาพ</h3>
                        <button onclick="toggleManualEdit()" id="editBtn" class="text-xs bg-yellow-600 hover:bg-yellow-700 text-white px-2 py-1 rounded">แก้ไขเอง</button>
                    </div>
                    <div id="analysisResult" class="text-sm text-white mb-3">
                        <div>สินค้า: <span id="detectedName" class="font-bold">-</span></div>
                        <div>หมวดหมู่: <span id="detectedCategory" class="font-bold">-</span></div>
                    </div>

                    <!-- ฟอร์มแก้ไขเอง ซ่อนไว้ก่อน -->
                    <div id="manualEditForm" class="hidden border-t border-blue-800 pt-3 mt-3">
                        <label class="block text-xs text-gray-400 mb-1">ชื่อสินค้า</label>
                        <input type="text" id="manualName" class="w-full bg-gray-900 text-white text-sm rounded px-2 py-1 mb-2 border border-gray-700" placeholder="เช่น Nike Air Jordan 1">

                        <label class="block text-xs text-gray-400 mb-1">หมวดหมู่</label>
                        <select id="manualCategory" class="w-full bg-gray-900 text-white text-sm rounded px-2 py-1 border border-gray-700">
                            <option value="shoes">รองเท้า</option>
                            <option value="headphones">หูฟัง</option>
                            <option value="watch">นาฬิกา</option>
                            <option value="camera">กล้อง</option>
                            <option value="fashion">แฟชั่น/เสื้อผ้า</option>
                            <option value="beauty">บิวตี้/สกินแคร์</option>
                            <option value="general">ทั่วไป</option>
                        </select>
                        <button onclick="saveManualEdit()" class="mt-2 text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded">บันทึก</button>
                    </div>
                </div>

                <button onclick="generateVideo()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded disabled:bg-gray-600 disabled:cursor-not-allowed">
                    Generate
                </button>

                <div id="statusBox" class="hidden mt-3 text-sm text-center p-2 rounded bg-gray-800 text-yellow-400"></div>

                <div id="progressWrapper" class="hidden mt-4">
                    <div class="flex justify-between mb-1">
                        <span class="text-sm text-gray-400">กำลังสร้าง...</span>
                        <span id="progressText" class="text-sm text-gray-400">0%</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-2.5">
                        <div id="progressBar" class="progress-bar bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div id="result" class="hidden">
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="card rounded-lg p-6">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-lg font-bold text-white">Prompt สำหรับ Meta AI</h3>
                            <button onclick="copyPrompt()" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded">Copy</button>
                        </div>
                        <div class="bg-black rounded p-3 text-sm text-green-400 font-mono whitespace-pre-wrap" id="promptOutput"></div>
                    </div>
                    <div class="card rounded-lg p-6">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-lg font-bold text-white">แคปชั่น TikTok + 5 Hashtags</h3>
                            <button onclick="copyTiktok()" class="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded">Copy</button>
                        </div>
                        <div class="bg-black rounded p-3 text-sm text-white whitespace-pre-wrap" id="tiktokOutput"></div>
                    </div>
                </div>
                <div class="card rounded-lg p-6 mt-6">
                    <h3 class="text-lg font-bold text-white mb-4">Label ประสิทธิภาพ - Mock Data</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-center">
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-blue-400" id="labelViews">0</div><div class="text-xs text-gray-500">ยอดวิว</div></div>
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-green-400" id="labelSales">$0</div><div class="text-xs text-gray-500">ยอดขาย</div></div>
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-yellow-400" id="labelCTR">0%</div><div class="text-xs text-gray-500">CTR</div></div>
                        <div class="bg-black rounded p-3"><div class="text-2xl font-bold text-purple-400" id="labelTime">0s</div><div class="text-xs text-gray-500">เวลา Gen</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageData = [
            { product_name: 'Nike Air Max Test', image_url: 'https://images.unsplash.com/photo-1542291026-7eec48a0a48c', prompt: 'photorealistic, studio lighting, 8k', ai_model: 'Meta AI', gen_time_sec: 15, views: 234, commission: 35.50 },
            { product_name: 'Sony WH-1000XM5', image_url: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e', prompt: 'minimalist product shot, white background', ai_model: 'Gemini', gen_time_sec: 8, views: 120, commission: 89.00 }
        ];

        let uploadedFiles = [];
        let detectedProduct = { name: 'สินค้า', category: 'general' };

        const hashtagDB = {
            shoes: ['#รองเท้า', '#sneakerhead', '#outfit', '#สตรีทแฟชั่น', '#ของมันต้องมี'],
            headphones: ['#หูฟัง', '#gadget', '#เพลง', '#เกมมิ่ง', '#unbox'],
            watch: ['#นาฬิกา', '#accessory', '#luxury', '#tech', '#outfit'],
            camera: ['#กล้อง', '#ถ่ายรูป', '#vlog', '#contentcreator', '#photography'],
            fashion: ['#แฟชั่น', '#outfit', '#แต่งตัว', '#ป้ายยา', '#ของดีบอกต่อ'],
            beauty: ['#สกินแคร์', '#เครื่องสำอาง', '#รีวิวบิวตี้', '#howto', '#glowup'],
            general: ['#TikTokMadeMeBuyIt', '#ป้ายยา', '#รีวิวของดี', '#ของมันต้องมี', '#ถูกและดี']
        };

        const categoryNames = {
            shoes: 'รองเท้า/แฟชั่น', headphones: 'หูฟัง/แกดเจ็ต', watch: 'นาฬิกา/แอคเซสเซอรี่',
            camera: 'กล้อง/อุปกรณ์', fashion: 'แฟชั่น/เสื้อผ้า', beauty: 'บิวตี้/สกินแคร์', general: 'ทั่วไป'
        };

        function switchTab(tab) {
            document.getElementById('tab-image').className = tab === 'image'? 'pb-3 tab-active' : 'pb-3 tab-inactive';
            document.getElementById('tab-video').className = tab === 'video'? 'pb-3 tab-active' : 'pb-3 tab-inactive';
            document.getElementById('content-image').className = tab === 'image'? '' : 'hidden';
            document.getElementById('content-video').className = tab === 'video'? '' : 'hidden';
            if(tab === 'image') renderImageTab();
        }

        function renderImageTab() {
            const grid = document.getElementById('grid-image');
            grid.innerHTML = '';
            imageData.forEach(item => {
                grid.innerHTML += `<div class="card rounded-lg overflow-hidden shadow-lg"><img src="${item.image_url}" alt="${item.product_name}" class="w-full h-48 object-cover"><div class="p-4"><div class="flex justify-between items-start mb-2"><h2 class="text-lg font-bold text-white">${item.product_name}</h2><span class="text-xs bg-blue-600 text-white px-2 py-1 rounded">${item.ai_model}</span></div><p class="text-sm text-gray-400 mb-3 h-10">${item.prompt}</p><div class="flex justify-between text-xs text-gray-500 border-t border-gray-700 pt-3"><span>⏱️ ${item.gen_time_sec}s</span><span>👁️ ${item.views} views</span><span class="text-green-400 font-bold">$${item.commission}</span></div></div></div>`;
            });
        }

        // ใหม่: วิเคราะห์รูปทันทีที่อัปโหลด
        document.getElementById('imageUpload').onchange = function(e) {
            const preview = document.getElementById('preview');
            const fileCount = document.getElementById('fileCount');
            preview.innerHTML = '';
            uploadedFiles = Array.from(e.target.files || []).slice(0, 5);

            if (uploadedFiles.length === 0) {
                fileCount.innerText = 'ยังไม่ได้เลือกรูป';
                document.getElementById('analysisCard').classList.add('hidden');
                updateStatus('', true);
                return;
            }

            fileCount.innerText = `เลือกแล้ว ${uploadedFiles.length} รูป`;
            updateStatus(`กำลังวิเคราะห์รูป...`, false);

            uploadedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML += `<img src="${e.target.result}" class="w-full h-20 object-cover rounded">`;
                }
                reader.readAsDataURL(file);
            });

            // วิเคราะห์ทันทีหลังเลือกไฟล์
            setTimeout(() => {
                analyzeProduct();
                document.getElementById('analysisCard').classList.remove('hidden');
                updateStatus('วิเคราะห์เสร็จแล้ว พร้อม Generate', false);
                setTimeout(() => updateStatus('', true), 2000);
            }, 500);
        };

        function analyzeProduct() {
            const fileName = uploadedFiles[0].name.toLowerCase();
            let category = 'general';
            let name = uploadedFiles[0].name.split('.')[0].replace(/[-_]/g, ' ');

            if (fileName.includes('shoe') || fileName.includes('nike') || fileName.includes('adidas') || fileName.includes('รองเท้า')) {
                category = 'shoes';
            } else if (fileName.includes('headphone') || fileName.includes('sony') || fileName.includes('หูฟัง')) {
                category = 'headphones';
            } else if (fileName.includes('watch') || fileName.includes('นาฬิกา')) {
                category = 'watch';
            } else if (fileName.includes('camera') || fileName.includes('กล้อง')) {
                category = 'camera';
            } else if (fileName.includes('cream') || fileName.includes('serum') || fileName.includes('ครีม')) {
                category = 'beauty';
            } else if (fileName.includes('shirt') || fileName.includes('dress') || fileName.includes('เสื้อ')) {
                category = 'fashion';
            }

            detectedProduct = { name, category };
            document.getElementById('detectedName').innerText = name;
            document.getElementById('detectedCategory').innerText = categoryNames[category];
            document.getElementById('manualName').value = name;
            document.getElementById('manualCategory').value = category;
        }

        function toggleManualEdit() {
            const form = document.getElementById('manualEditForm');
            form.classList.toggle('hidden');
            document.getElementById('editBtn').innerText = form.classList.contains('hidden')? 'แก้ไขเอง' : 'ยกเลิก';
        }

        function saveManualEdit() {
            detectedProduct.name = document.getElementById('manualName').value || 'สินค้า';
            detectedProduct.category = document.getElementById('manualCategory').value;
            document.getElementById('detectedName').innerText = detectedProduct.name;
            document.getElementById('detectedCategory').innerText = categoryNames[detectedProduct.category];
            toggleManualEdit();
            updateStatus('บันทึกรายละเอียดแล้ว', false);
            setTimeout(() => updateStatus('', true), 2000);
        }

        function updateStatus(msg, hide = false) {
            const box = document.getElementById('statusBox');
            if (hide || msg === '') {
                box.classList.add('hidden');
            } else {
                box.innerText = msg;
                box.classList.remove('hidden');
            }
        }

        function generateVideo() {
            if (uploadedFiles.length === 0) {
                updateStatus('กรุณาอัปโหลดรูปอย่างน้อย 1 รูปก่อน', false);
                return;
            }

            document.getElementById('genBtn').disabled = true;
            document.getElementById('progressWrapper').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');

            let progress = 0;
            const steps = [
                '1/4 กำลังใช้ข้อมูลที่วิเคราะห์ได้...',
                '2/4 กำลังสร้าง Prompt เฉพาะสินค้า...',
                '3/4 กำลังเขียนแคปชั่น + เลือก 5 Hashtags...',
                '4/4 เสร็จสิ้น!'
            ];

            const interval = setInterval(() => {
                progress += 25;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('progressText').innerText = progress + '%';
                updateStatus(steps[progress/25 - 1], false);

                if (progress >= 100) {
                    clearInterval(interval);
                    showResults();
                    document.getElementById('genBtn').disabled = false;
                    updateStatus('สร้างเสร็จแล้ว คัดลอกไปใช้ได้เลย', false);
                    setTimeout(() => updateStatus('', true), 3000);
                }
            }, 500);
        }

        function showResults() {
            const { name, category } = detectedProduct;
            const keywords = hashtagDB[category];

            const promptText = `Create a 5-second cinematic product video. Subject: ${name}, Category: ${categoryNames[category]}. Camera slowly orbits 360 degrees around product, then zoom in on key detail. Studio lighting, 4k, smooth motion, premium commercial style.`;
            document.getElementById('promptOutput').innerText = promptText;

            const tiktokText = `เจอของดี ${categoryNames[category]}! ${name} ตัวนี้คือที่สุด 📸✨\nใครโดนป้ายยาแล้ว เม้น "โดน" มาหน่อย\n.\n#${name.replace(/\s/g,'')} ${keywords.join(' ')}`;
            document.getElementById('tiktokOutput').innerText = tiktokText;

            document.getElementById('labelViews').innerText = Math.floor(Math.random() * 1000 + 100);
            document.getElementById('labelSales').innerText = '$' + (Math.random() * 200 + 10).toFixed(2);
            document.getElementById('labelCTR').innerText = (Math.random() * 5 + 1).toFixed(2) + '%';
            document.getElementById('labelTime').innerText = Math.floor(Math.random() * 60 + 15) + 's';

            document.getElementById('result').classList.remove('hidden');
            document.getElementById('progressWrapper').classList.add('hidden');
        }

        function copyPrompt() {
            navigator.clipboard.writeText(document.getElementById('promptOutput').innerText);
            updateStatus('คัดลอก Prompt แล้ว!', false);
            setTimeout(() => updateStatus('', true), 2000);
        }
        function copyTiktok() {
            navigator.clipboard.writeText(document.getElementById('tiktokOutput').innerText);
            updateStatus('คัดลอกแคปชั่นแล้ว!', false);
            setTimeout(() => updateStatus('', true), 2000);
        }

        switchTab('video');
        renderImageTab();
    </script>
</body>
</html>
