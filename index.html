<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Vaulted - My Gen Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
          <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
            <style>
                body { background: #0A0A0A; color: #E5E5E5; font-family: 'Inter', sans-serif; }
                    .card { background: #171717; border: 1px solid #262626; }
                      </style>
                      </head>
                      <body class="p-4">
                        <div class="max-w-6xl mx-auto">
                            <h1 class="text-3xl font-bold mb-6 text-[#A3A3A3]">VAULTED<span class="text-[#6B7280]">_</span></h1>
                                
                                    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                          <!-- การ์ดจะมาแสดงตรงนี้ -->
                                              </div>
                                                </div>

                                                <script>
                                                  const SUPABASE_URL = 'https://yzogzgvlwmuncbaubzxf.storage.supabase.co/storage/v1/s3'
                                                    const SUPABASE_KEY = 'sb_publishable_PM8mip-wY2HBell9s4wbNg_08PWzVL3'
                                                      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

                                                        async function loadData() {
                                                            const { data, error } = await supabase.from('generations').select('*').order('created_at', { ascending: false })
                                                                const container = document.getElementById('dashboard')
                                                                    container.innerHTML = ''
                                                                        
                                                                            data.forEach(item => {
                                                                                  container.innerHTML += `
                                                                                          <div class="card rounded-xl p-4">
                                                                                                    <img src="${item.image_url}" class="rounded-lg w-full h-48 object-cover mb-3" onerror="this.src='https://placehold.co/600x400/171717/6B7280?text=No+Image'">
                                                                                                              <h2 class="font-bold text-lg mb-1">${item.product_name}</h2>
                                                                                                                        <p class="text-[#A3A3A3] text-sm mb-2">${item.ai_model} | ${item.gen_time_sec}s</p>
                                                                                                                                  <p class="text-xs text-[#6B7280] mb-3 break-words">${item.prompt}</p>
                                                                                                                                            <div class="flex justify-between text-sm">
                                                                                                                                                        <span>👁️ ${item.views || 0}</span>
                                                                                                                                                                    <span class="text-green-400">฿${item.commission || 0}</span>
                                                                                                                                                                              </div>
                                                                                                                                                                                      </div>
                                                                                                                                                                                            `
                                                                                                                                                                                                })
                                                                                                                                                                                                  }
                                                                                                                                                                                                    
                                                                                                                                                                                                      loadData()
                                                                                                                                                                                                      </script>
                                                                                                                                                                                                      </body>
                                                                                                                                                                                                      </html>1
